services:
  rabbitmq:
    image: rabbitmq:4.2
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672" # AMQP
      - "15672:15672" # UI
    environment:
      RABBITMQ_DEFAULT_USER: rabbit
      RABBITMQ_DEFAULT_PASS: rabbit123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "status" ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgresql:
    image: postgres:18-bookworm
    container_name: postgresql18
    restart: unless-stopped
    environment:
      POSTGRES_USER: mkk
      POSTGRES_PASSWORD: mkk
      POSTGRES_DB: mkk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready --dbname=mkk --username=user" ]
      interval: 5s
      timeout: 5s
      retries: 5

  base: &base
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - ./:/usr/src
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgresql:
        condition: service_healthy

  app:
    <<: *base
    container_name: mkk
    restart: unless-stopped
    command: ["fastapi", "run", "src/mkk/main.py"]
    ports:
      - "8000:8000"

  tests:
    <<: *base
    container_name: mkk_test
    command: ["pytest", "-s", "tests"]

  migrations:
    <<: *base
    container_name: mkk_migrations
    command: ["alembic", "upgrade", "head"]

volumes:
  rabbitmq_data:
  postgres_data: